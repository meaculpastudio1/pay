
<!doctype html>
<html lang="el">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lantern AI · Πληρωμή</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0b1220; color: #e8edf5; padding: 24px;
  }
  .card {
    max-width: 420px; width: 100%; background: #131c2e; border-radius: 20px;
    padding: 36px 28px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,.4);
  }
  .badge {
    width: 76px; height: 76px; border-radius: 50%; margin: 0 auto 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 40px; color: #fff;
  }
  h1 { font-size: 22px; margin: 0 0 10px; }
  p { font-size: 16px; line-height: 1.5; color: #aebbd0; margin: 0 0 8px; }
  .hint { font-size: 14px; color: #7f8ca6; margin-top: 18px; }
  .btn {
    display: inline-block; margin-top: 22px; padding: 14px 26px; border-radius: 999px;
    background: #16a34a; color: #fff; font-size: 16px; font-weight: 600;
    text-decoration: none; border: none; cursor: pointer;
  }
  .brand { margin-top: 26px; font-size: 13px; color: #5b6b80; letter-spacing: .5px; }
</style>
</head>
<body>
  <div class="card">
    <div class="badge" id="badge"></div>
    <h1 id="title"></h1>
    <p id="msg"></p>
    <a class="btn" id="openBtn" href="#">Επιστροφή στην εφαρμογή</a>
    <p class="hint" id="hint"></p>
    <div class="brand">LANTERN AI · FamilyShield</div>
  </div>
<script>
  var cancelled = new URLSearchParams(location.search).get('status') === 'cancel';
  var badge = document.getElementById('badge');
  var openBtn = document.getElementById('openBtn');

  // Σύνδεσμος που ανοίγει την εφαρμογή Lantern AI (μέσω package, χωρίς αλλαγή κώδικα).
  var APP_INTENT = 'intent://open#Intent;package=com.lanternai.familyshield;end';

  function openApp() {
    try { window.location.href = APP_INTENT; } catch (e) {}
  }

  if (cancelled) {
    badge.textContent = '\u2715';
    badge.style.background = '#dc2626';
    document.getElementById('title').textContent = 'Η πληρωμή ακυρώθηκε';
    document.getElementById('msg').textContent = 'Δεν ολοκληρώθηκε καμία χρέωση. Μπορείς να ξαναπροσπαθήσεις όποτε θες από την εφαρμογή.';
    document.getElementById('hint').textContent = '';
    openBtn.textContent = 'Επιστροφή στην εφαρμογή';
    openBtn.style.background = '#3b4763';
    openBtn.addEventListener('click', function (ev) { ev.preventDefault(); openApp(); });
  } else {
    badge.textContent = '\u2713';
    badge.style.background = '#16a34a';
    document.getElementById('title').textContent = 'Η πληρωμή ολοκληρώθηκε';
    document.getElementById('msg').textContent = 'Ευχαριστούμε! Η συνδρομή σου ενεργοποιείται μέσα σε λίγα δευτερόλεπτα.';
    document.getElementById('hint').textContent = 'Αν δεν γυρίσεις αυτόματα, πάτησε το κουμπί παραπάνω.';
    openBtn.addEventListener('click', function (ev) { ev.preventDefault(); openApp(); });
    // Προσπάθεια αυτόματης επιστροφής στην εφαρμογή μετά από ~2 δευτερόλεπτα.
    setTimeout(openApp, 2000);
  }
</script>
</body>
</html>

<!doctype html>
<html lang="el">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lantern AI · Πληρωμή</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0b1220; color: #e8edf5; padding: 24px;
  }
  .card {
    max-width: 420px; width: 100%; background: #131c2e; border-radius: 20px;
    padding: 36px 28px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,.4);
    transition: opacity .6s ease;
  }
  .card.fade { opacity: 0; }
  .badge {
    width: 76px; height: 76px; border-radius: 50%; margin: 0 auto 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 40px; color: #fff;
  }
  h1 { font-size: 22px; margin: 0 0 10px; }
  p { font-size: 16px; line-height: 1.5; color: #aebbd0; margin: 0 0 8px; }
  .hint { font-size: 14px; color: #7f8ca6; margin-top: 18px; }
  .btn {
    display: inline-block; margin-top: 22px; padding: 14px 26px; border-radius: 999px;
    background: #16a34a; color: #fff; font-size: 16px; font-weight: 600;
    text-decoration: none; border: none; cursor: pointer;
  }
  .brand { margin-top: 26px; font-size: 13px; color: #5b6b80; letter-spacing: .5px; }
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="badge" id="badge"></div>
    <h1 id="title"></h1>
    <p id="msg"></p>
    <a class="btn" id="openBtn" href="#">Επιστροφή στην εφαρμογή</a>
    <p class="hint" id="hint"></p>
    <div class="brand">LANTERN AI · FamilyShield</div>
  </div>
<script>
  var params    = new URLSearchParams(location.search);
  var cancelled = params.get('status') === 'cancel';
  var noApp     = params.get('noapp') === '1';

  var card   = document.getElementById('card');
  var badge  = document.getElementById('badge');
  var openBtn= document.getElementById('openBtn');
  var titleEl= document.getElementById('title');
  var msgEl  = document.getElementById('msg');
  var hintEl = document.getElementById('hint');

  var PKG = 'com.lanternai.familyshield';

  var FALLBACK = location.origin + location.pathname
                 + '?status=' + (cancelled ? 'cancel' : 'ok') + '&noapp=1';

  var APP_INTENT = 'intent://pay#Intent;scheme=lanternai;package=' + PKG +
                   ';S.browser_fallback_url=' + encodeURIComponent(FALLBACK) + ';end';

  function openApp() {
    try { window.location.href = APP_INTENT; } catch (e) {}
  }

  if (cancelled) {
    badge.textContent = '\u2715';
    badge.style.background = '#dc2626';
    titleEl.textContent = 'Η πληρωμή ακυρώθηκε';
    msgEl.textContent   = 'Δεν ολοκληρώθηκε καμία χρέωση. Μπορείς να ξαναπροσπαθήσεις όποτε θες από την εφαρμογή.';
    openBtn.style.background = '#3b4763';
  } else {
    badge.textContent = '\u2713';
    badge.style.background = '#16a34a';
    titleEl.textContent = 'Η πληρωμή ολοκληρώθηκε';
    msgEl.textContent   = 'Ευχαριστούμε! Η συνδρομή σου ενεργοποιείται μέσα σε λίγα δευτερόλεπτα.';
  }

  openBtn.addEventListener('click', function (ev) { ev.preventDefault(); openApp(); });

  if (noApp) {
    hintEl.textContent = 'Κλείσε αυτή την καρτέλα και άνοιξε την εφαρμογή Lantern AI, ή πάτησε το κουμπί.';
  } else {
    hintEl.textContent = 'Επιστροφή στην εφαρμογή...';
    setTimeout(function () { card.classList.add('fade'); }, 1400);
    setTimeout(openApp, 2000);
  }
</script>
</body>
</html>
